name: Build Grim Client JAR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Find project and build
        run: |
          if [ -f "settings.gradle" ]; then
            gradle build
          elif [ -f "GrimFinal/settings.gradle" ]; then
            cd GrimFinal && gradle build
          else
            DIR=$(find . -name "settings.gradle" -not -path "*/build/*" | head -1 | xargs dirname)
            cd $DIR && gradle build
          fi

      - name: Create Release and Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Grim Client Release v1.0.0
          files: |
            **/build/libs/*.jar
            !**/build/libs/*-sources.jar
            !**/build/libs/*-dev.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
